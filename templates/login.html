<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h1>Login</h1>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Benutzername"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Passwort"
        required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<br>

<a href="/register">
    Registrieren
</a>

</body>
</html>
