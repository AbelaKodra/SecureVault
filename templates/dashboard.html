<!DOCTYPE html>
<html>

<head>
    <title>SecureVault</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1 class="mb-4">🔐 SecureVault</h1>

    <p>Willkommen <strong>{{ username }}</strong></p>

    <a href="/export" class="btn btn-success mb-3">
        CSV Export
    </a>

    <a href="/logout" class="btn btn-danger mb-3">
        Logout
    </a>

    <hr>

    <div class="card p-4 mb-4">

        <h3>Neues Passwort</h3>

        <form action="/add" method="POST">

            <div class="mb-3">
                <input
                    class="form-control"
                    name="title"
                    placeholder="Titel"
                    required>
            </div>

            <div class="mb-3">
                <input
                    class="form-control"
                    name="website"
                    placeholder="Website">
            </div>

            <div class="mb-3">
                <input
                    class="form-control"
                    name="username"
                    placeholder="Benutzername">
            </div>

            <div class="mb-3">
                <input
                    class="form-control"
                    name="password"
                    placeholder="Passwort"
                    required>
            </div>

            <button class="btn btn-primary">
                Passwort speichern
            </button>

        </form>

    </div>

    <h3>Gespeicherte Passwörter</h3>

    <form action="/search">

        <div class="input-group mb-3">

            <input
                type="text"
                class="form-control"
                name="q"
                placeholder="Nach Titel suchen">

            <button class="btn btn-secondary">
                Suchen
            </button>

        </div>

    </form>

    <table class="table table-striped table-bordered">

        <thead>

            <tr>
                <th>Titel</th>
                <th>Website</th>
                <th>Benutzername</th>
                <th>Passwort</th>
                <th>Aktion</th>
            </tr>

        </thead>

        <tbody>

            {% for p in passwords %}

            <tr>

                <td>{{ p.title }}</td>
                <td>{{ p.website }}</td>
                <td>{{ p.username }}</td>
                <td>{{ p.password }}</td>

                <td>

                    <a
                        href="/delete/{{ p.id }}"
                        class="btn btn-sm btn-danger">

                        Löschen

                    </a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</body>

</html>
