<!DOCTYPE html>
<html>
<head>
    <title>Registrierung</title>
</head>
<body>

<h1>Registrierung</h1>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Benutzername"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Passwort"
        required>

    <br><br>

    <button type="submit">
        Registrieren
    </button>

</form>

<br>

<a href="/login">
    Zum Login
</a>

</body>
</html>
