<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-md-5">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <h1>🔐 SecureVault</h1>

                        <p class="text-muted">
                            Sicherer Passwort-Manager
                        </p>

                    </div>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Benutzername
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Passwort
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Anmelden

                        </button>

                    </form>

                    <hr>

                    <div class="text-center">

                        <p>
                            Noch kein Konto?
                        </p>

                        <a
                            href="/register"
                            class="btn btn-outline-secondary">

                            Registrieren

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
